<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPT Researcher + AG2</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; display: flex; height: 100vh; background: #f5f5f5; }

        /* Left: research input and report output */
        .main { flex: 1; display: flex; flex-direction: column; padding: 24px; gap: 16px; overflow: hidden; }
        .main > h2 { font-size: 20px; font-weight: 600; }
        .input-row { display: flex; gap: 8px; }
        .input-row input {
            flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 15px; background: #fff;
        }
        .input-row button {
            padding: 10px 24px; background: #1a73e8; color: #fff; border: none;
            border-radius: 6px; cursor: pointer; font-size: 15px; white-space: nowrap;
        }
        .input-row button:disabled { opacity: 0.5; cursor: default; }

        /* Report: renders markdown as HTML */
        .report {
            flex: 1; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px;
            padding: 28px 32px; background: #fff; color: #1a1a1a;
            font-size: 15px; line-height: 1.7;
        }
        .report.placeholder { color: #aaa; font-style: italic; display: flex; align-items: center; justify-content: center; }

        /* Markdown content styles */
        .report h1 { font-size: 22px; font-weight: 700; margin: 0 0 16px; color: #111; }
        .report h2 { font-size: 18px; font-weight: 600; margin: 28px 0 10px; color: #111; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .report h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #222; }
        .report p { margin: 0 0 12px; }
        .report ul, .report ol { margin: 0 0 12px 24px; }
        .report li { margin-bottom: 4px; }
        .report a { color: #1a73e8; text-decoration: none; }
        .report a:hover { text-decoration: underline; }
        .report strong { font-weight: 600; }
        .report em { font-style: italic; }
        .report blockquote {
            border-left: 3px solid #ddd; margin: 0 0 12px; padding: 8px 16px;
            color: #555; background: #fafafa; border-radius: 0 4px 4px 0;
        }
        .report code {
            background: #f4f4f4; border-radius: 3px; padding: 1px 5px;
            font-family: ui-monospace, monospace; font-size: 13px;
        }
        .report pre {
            background: #f4f4f4; border-radius: 6px; padding: 14px 16px;
            overflow-x: auto; margin: 0 0 12px;
        }
        .report pre code { background: none; padding: 0; font-size: 13px; }

        /* Tables */
        .report table {
            border-collapse: collapse; width: 100%; margin: 0 0 16px;
            font-size: 14px;
        }
        .report th {
            background: #f0f4ff; font-weight: 600; text-align: left;
            padding: 9px 12px; border: 1px solid #dde4f0; color: #333;
        }
        .report td {
            padding: 8px 12px; border: 1px solid #e8ecf4; vertical-align: top;
        }
        .report tr:nth-child(even) td { background: #fafbff; }

        /* Right: pipeline progress panel */
        .pipeline {
            width: 260px; display: flex; flex-direction: column; border-left: 1px solid #ddd;
            padding: 24px; background: #fff; gap: 16px; flex-shrink: 0;
        }
        .pipeline h2 { font-size: 16px; font-weight: 600; }
        .status-block { display: flex; flex-direction: column; gap: 4px; }
        .status-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #999; }
        .status-value { font-size: 14px; font-weight: 600; color: #1a73e8; text-transform: capitalize; }
        .agents { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
        .agent {
            padding: 8px 12px; border-radius: 6px; font-size: 13px;
            border: 1px solid #eee; background: #fafafa; color: #555;
            transition: all 0.25s;
        }
        .agent.active {
            background: #e8f0fe; border-color: #1a73e8;
            font-weight: 600; color: #1a73e8;
        }
        .agent.done {
            background: #f0faf0; border-color: #34a853; color: #34a853;
        }
    </style>
</head>
<body>
    <div class="main">
        <h2>GPT Researcher + AG2</h2>
        <div class="input-row">
            <input type="text" id="query" placeholder="Enter your research question..." autofocus>
            <button id="run-btn" onclick="startResearch()">Research</button>
        </div>
        <div class="report placeholder" id="report">Your report will appear here when research is complete.</div>
    </div>

    <div class="pipeline">
        <h2>Pipeline</h2>
        <div class="status-block">
            <div class="status-label">Stage</div>
            <div class="status-value" id="stage">Idle</div>
        </div>
        <div class="status-block">
            <div class="status-label">Active agent</div>
            <div class="status-value" id="active-agent">—</div>
        </div>
        <div class="agents" id="agents">
            <div class="agent" data-name="Chief Editor">Chief Editor</div>
            <div class="agent" data-name="Editor">Editor</div>
            <div class="agent" data-name="Researcher">Researcher</div>
            <div class="agent" data-name="Reviewer">Reviewer</div>
            <div class="agent" data-name="Revisor">Revisor</div>
            <div class="agent" data-name="Writer">Writer</div>
            <div class="agent" data-name="Publisher">Publisher</div>
        </div>
    </div>

    <script>
    const queryEl = document.getElementById('query');
    const runBtn = document.getElementById('run-btn');
    const reportEl = document.getElementById('report');
    const stageEl = document.getElementById('stage');
    const activeAgentEl = document.getElementById('active-agent');

    const AGENT_ORDER = [
        'Chief Editor', 'Editor', 'Researcher', 'Reviewer', 'Revisor', 'Writer', 'Publisher'
    ];

    function setActiveAgent(name) {
        const agentEls = document.querySelectorAll('.agent');
        let found = false;
        agentEls.forEach(el => {
            if (el.dataset.name === name) {
                el.className = 'agent active';
                found = true;
            } else if (found) {
                el.className = 'agent';
            } else {
                el.className = 'agent done';
            }
        });
        activeAgentEl.textContent = name || '—';
    }

    function resetAgents() {
        document.querySelectorAll('.agent').forEach(el => el.className = 'agent');
        activeAgentEl.textContent = '—';
    }

    // STATE_SNAPSHOT handler: the backend updates context_variables when each
    // pipeline stage changes, and AGUIStream broadcasts them here automatically.
    // The full report arrives in snapshot.report from the write_report tool,
    // so the LLM never needs to output the report text itself.
    function handleSnapshot(snapshot) {
        if (snapshot.stage) {
            stageEl.textContent = snapshot.stage.replace(/_/g, ' ');
        }
        if (snapshot.active_agent !== undefined) {
            setActiveAgent(snapshot.active_agent);
        }
        if (snapshot.report) {
            reportEl.classList.remove('placeholder');
            reportEl.innerHTML = marked.parse(snapshot.report);
        }
    }

    async function startResearch() {
        const query = queryEl.value.trim();
        if (!query) return;

        runBtn.disabled = true;
        reportEl.innerHTML = 'Researching…';
        reportEl.classList.add('placeholder');
        stageEl.textContent = 'Starting...';
        resetAgents();

        const payload = {
            threadId: 'research-thread',
            runId: 'run-' + Date.now(),
            messages: [{ id: '1', role: 'user', content: query }],
            state: {}, context: [], tools: [], forwardedProps: {},
        };

        try {
            const response = await fetch('/research/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'text/event-stream',
                },
                body: JSON.stringify(payload),
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const event = JSON.parse(line.slice(6));
                        switch (event.type) {
                            case 'STATE_SNAPSHOT':
                                handleSnapshot(event.snapshot);
                                break;
                            case 'RUN_ERROR':
                                reportEl.classList.remove('placeholder');
                                reportEl.textContent = 'Error: ' + (event.message || 'Unknown error');
                                break;
                        }
                    } catch (e) { /* skip parse errors */ }
                }
            }
        } catch (err) {
            reportEl.textContent = 'Connection error: ' + err.message;
        } finally {
            runBtn.disabled = false;
            stageEl.textContent = 'Complete';
            setActiveAgent('');
        }
    }

    queryEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') startResearch();
    });
    </script>
</body>
</html>
