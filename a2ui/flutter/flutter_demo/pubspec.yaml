name: flutter_demo
description: A2UI v0.9 Flutter demo — connects to an AG2 A2A server and renders rich UI.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  genui:
    git:
      url: https://github.com/flutter/genui.git
      ref: 938a49d72208a67f67581ebe2a4f8c1bf9c26a18
      path: packages/genui
  genui_a2a:
    git:
      url: https://github.com/flutter/genui.git
      ref: 938a49d72208a67f67581ebe2a4f8c1bf9c26a18
      path: packages/genui_a2a
  json_schema_builder: ^0.1.3
  logging: ^1.3.0
  provider: ^6.1.5+1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  genui:
    git:
      url: https://github.com/flutter/genui.git
      ref: 938a49d72208a67f67581ebe2a4f8c1bf9c26a18
      path: packages/genui

flutter:
  uses-material-design: true
